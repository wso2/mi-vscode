name: Sync Main with Release Branches
on:
  pull_request:
    types:
      - closed
    branches:
      - 'stable/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-main:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Configure Git
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Create temporary branch and sync changes
        run: |
          RELEASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          TEMP_BRANCH="sync/main-${RELEASE_BRANCH}-$(date +%s)"
          git checkout $RELEASE_BRANCH
          git checkout -b $TEMP_BRANCH
          git push origin $TEMP_BRANCH

      - name: Create Pull Request
        id: commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          TEMP_BRANCH=$(git branch --show-current)

          prURL=$(gh pr create \
            --base main \
            --head $TEMP_BRANCH \
            --title "Automatic Sync: Merge changes from ${RELEASE_BRANCH} to main" \
            --body "This PR syncs changes from ${RELEASE_BRANCH} to the main branch.

            Automated PR created by GitHub Actions.")

          echo "prURL=$prURL" >> $GITHUB_OUTPUT

      - name: "PR Notification"
        shell: bash
        run: |
          body=$(cat << EOF
          {
            "cards": [
              {
                "header": {
                    "title": "Automatic Sync PR"
                },
                "sections": [
                  {
                    "widgets": [
                      {
                        "keyValue": {
                          "topLabel": "Pull Request",
                          "content": "${{ steps.commit.outputs.prURL }}",
                          "button": {
                            "textButton": {
                              "text": "Approve",
                              "onClick": {
                                "openLink": {
                                  "url": "${{ steps.commit.outputs.prURL }}/files"
                                }
                              }
                            }
                          }
                        }
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF
          )
          curl \
            -X POST \
            -H 'Content-Type: application/json' \
            "${{ secrets.EDITOR_TEAM_CHAT_API }}" \
            -d "$body"

  notify-failure:
    needs: [sync-main]
    if: ${{ always() && contains(needs.*.result, 'failure') && github.repository == 'wso2/mi-vscode' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: "Failure Notification"
        uses: ./.github/actions/failure-notification
        with:
          title: "Sync Main with Release Branches Failed"
          run_id: ${{ github.run_id }}
          chat_api: ${{ secrets.EDITOR_TEAM_CHAT_API }}
          repository: ${{ github.repository }}
