name: Release VSIX

on:
  workflow_dispatch:
    inputs:
      isPreRelease:
        required: true
        type: boolean 
      version:
        type: choice
        description: 'Enter the version type'
        required: true
        default: 'N/A'
        options:
          - 'patch'
          - 'minor'
          - 'major'    
          - 'N/A'     

permissions:
  contents: write
  pull-requests: write

jobs:
  Build:
    name: Build branch - ${{ github.ref_name }}
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      runOnAWS: true
      isPreRelease: ${{ inputs.isPreRelease }}
      enableCache: false
      mi: true
      version: ${{ inputs.version }}
      isReleaseBuild: true

  Release:
    name: Release VSIX
    needs: Build
    timeout-minutes: 45
    runs-on: codebuild-wso2_vscode-extensions-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Restore build
        uses: actions/download-artifact@v4
        with:
          name: ExtBuild
          path: ./

      - name: Set up workspace
        run: |
          unzip build.zip
          rm build.zip

      - name: Setup Rush
        uses: gigara/setup-rush@v1.2.0
        with:
          pnpm: 10.10.0
          node: 22.x
          cache-rush: false
          cache-pnpm: false
          set-env: false
          rush-install: true

      - name: Get version
        id: vsix
        run: |
          shopt -s nullglob
          files=(micro-integrator-[0-9]*.[0-9]*.[0-9]*.vsix)
          if [ ${#files[@]} -ne 1 ]; then
            echo "Error: Expected exactly one .vsix file, found ${#files[@]}"
            exit 1
          fi
          file="${files[0]}"
          vsixName=$(basename "$file" .vsix)
          numericVersion="${vsixName#micro-integrator-}"
          echo "version=$vsixName" >> $GITHUB_OUTPUT
          echo "numericVersion=$numericVersion" >> $GITHUB_OUTPUT

      - name: Initiate release thread
        run: |
          RELEASE_TYPE=${{ inputs.isPreRelease == true && 'Pre-release' || 'Release' }}
          body=$(jq -n \
            --arg threadKey "mi-release-${{ github.run_id }}" \
            --arg numericVersion "${{ steps.vsix.outputs.numericVersion }}" \
            --arg releaseType "$RELEASE_TYPE" \
            --arg refName "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            --arg workflowUrl "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{
              thread: { threadKey: $threadKey },
              cards: [
                {
                  header: {
                    title: ("WSO2 Integrator: MI v" + $numericVersion + " " + $releaseType),
                    subtitle: ($refName + " · triggered by " + $actor)
                  },
                  sections: [
                    {
                      widgets: [
                        {
                          keyValue: {
                            topLabel: "Status",
                            content: "Release workflow started",
                            button: {
                              textButton: {
                                text: "View Workflow",
                                onClick: {
                                  openLink: {
                                    url: $workflowUrl
                                  }
                                }
                              }
                            }
                          }
                        }
                      ]
                    }
                  ]
                }
              ]
            }')
          curl -X POST \
            -H 'Content-Type: application/json' \
            "${{ secrets.EDITOR_TEAM_CHAT_API }}&messageReplyOption=REPLY_MESSAGE_FALLBACK_TO_NEW_THREAD" \
            -d "$body"
 
      - name: Create a release in wso2/mi-vscode repo
        uses: ./.github/actions/release
        with:
          repo: wso2/mi-vscode
          name: micro-integrator
          chatAPI: ${{ secrets.EDITOR_TEAM_CHAT_API }}
          threadKey: mi-release-${{ github.run_id }}

      - name: Create PR and notify
        uses: ./.github/actions/pr
        with:
          version: ${{ steps.vsix.outputs.version }}
          isPreRelease: ${{ github.event.inputs.isPreRelease }}
          threadKey: mi-release-${{ github.run_id }}
          mi: true
          chatAPI: ${{ secrets.EDITOR_TEAM_CHAT_API }}

  Notify:
    needs: [Release]
    if: ${{ always() && contains(needs.*.result, 'failure') && github.repository == 'wso2/mi-vscode'}}
    runs-on: codebuild-wso2_vscode-extensions-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: "Failure Notification"
        uses: ./.github/actions/failure-notification
        with:
          title: "Release Build Failed"
          run_id: ${{ github.run_id }}
          chat_api: ${{ secrets.EDITOR_TEAM_CHAT_API }}
          repository: ${{ github.repository }}
          thread_key: mi-release-${{ github.run_id }}
