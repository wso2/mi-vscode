name: 'Upload vsix to artifacts and notify'
description: 'Uploads the built VSIX as a workflow artifact and posts a Google Chat daily-build notification with a download link.'
inputs:
  title:
    description: 'Relase name'
    required: true
  fileName:
    description: 'File name'
    required: true
  chatAPI:
    description: 'Google chat API'
    required: true
  prUrl:
    description: 'Optional product-integrator pull request URL'
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    - name: Get version
      shell: bash
      id: vsix
      run: |
        file=$(ls ${{ inputs.fileName }}-[0-9]*.[0-9]*.[0-9]*.vsix)
        base=${file%.vsix}
        version=${base#${{ inputs.fileName }}-}
        extension=${{ inputs.fileName }}
        extensionName="$(echo "$extension" | sed 's/.*/\u&/')"
        echo "vsixName=$file" >> $GITHUB_OUTPUT
        echo "version=$version" >> $GITHUB_OUTPUT
        echo "extensionName=$extensionName" >> $GITHUB_OUTPUT

    - name: Save VSIX
      uses: actions/upload-artifact@v4
      id: artifact-upload
      with:
        path: ${{ steps.vsix.outputs.vsixName }}
        name: Vsix-Artifact-${{ inputs.fileName }}

    - name: "Release Notification"
      shell: bash
      run: |
          pr_widget=''
          if [ -n "${{ inputs.prUrl }}" ]; then
            pr_widget=$(cat << EOF
                      ,
                      {
                      "keyValue": {
                          "topLabel": "Product Integrator PR",
                          "content": "${{ inputs.prUrl }}",
                          "button": {
                          "textButton": {
                              "text": "View PR",
                              "onClick": {
                              "openLink": {
                                  "url": "${{ inputs.prUrl }}"
                              }
                              }
                          }
                          }
                      }
                      }
          EOF
          )
          fi
          body=$(cat << EOF
          {
          "cards": [
              { 
              "header": {
                  "title": "Daily Build"
              },
              "sections": [
                  {
                  "widgets": [
                      {
                      "keyValue": {
                          "topLabel": "${{ inputs.title }}",
                          "content": "v${{ steps.vsix.outputs.version }}",
                          "onClick": {
                          "openLink": {
                              "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                          }
                          },
                          "iconUrl": "https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Visual_Studio_Code_1.35_icon.svg/512px-Visual_Studio_Code_1.35_icon.svg.png",
                          "button": {
                          "textButton": {
                              "text": "Download VSIX",
                              "onClick": {
                              "openLink": {
                                  "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.artifact-upload.outputs.artifact-id }}"
                              }
                              }
                          }
                          }
                      }
                      }
                      ${pr_widget}
                  ]
                  }
              ]
              }
          ]
          }
          EOF
          )
          curl \
          -X POST \
          -H 'Content-Type: application/json' \
          "${{ inputs.chatAPI }}" \
          -d "$body"
