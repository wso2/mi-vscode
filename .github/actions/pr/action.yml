name: 'Create PR and send notification'
inputs:
  version:
    description: 'Publish version'
    required: true
  isPreRelease:
    default: true
    type: boolean
  chatAPI:
    description: 'Google chat API'
    required: true
  bot_username:
    description: 'Release bot username'
    required: true
  bot_email:
    description: 'Release bot email'
    required: true
  bot_token:
    description: 'Release bot token'
    required: true
  mi:
    description: 'Is MI'
    type: boolean
    default: false

runs:
  using: "composite"
  steps:
    - name: Config git
      shell: bash
      run: |
        git config --global user.name ${{ inputs.bot_username }}
        git config --global user.email ${{ inputs.bot_email }}

    - name: Add MI git changes
      if: ${{ inputs.mi == 'true' }}
      shell: bash
      run: git add packages/mi-extension/package.json

    - name: Commit version
      shell: bash
      id: commit
      run: |
        mv .git/config .git/config-old
        git remote add origin https://${{ inputs.bot_token }}@github.com/${{ github.repository }}.git
        git diff --staged --quiet || git commit -m "Update version to ${{ inputs.version }}"
      env:
        GH_TOKEN: ${{ inputs.bot_token }}

    - name: Create tag
      shell: bash
      id: create_tag
      run: |
        git tag ${{ inputs.version }}
        git push origin "refs/tags/${{ inputs.version }}"

    - name: Create release branch
      shell: bash
      if: ${{ inputs.isPreRelease == 'false' }}
      id: create_branch
      run: |
        git checkout -b "${{ inputs.version }}"
        git push origin "refs/heads/${{ inputs.version }}"

    - name: Create Pull Request
      shell: bash
      if: ${{ inputs.isPreRelease == 'false' }}
      id: pr
      run: |
        pr=$(gh pr create -B "stable/mi" -H "${{ inputs.version }}" --title "Merge \"${{ inputs.version }}\" into \"stable/mi\"" --body '$subject')
        echo "prURL=$pr" >> $GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ inputs.bot_token }}

    - name: "PR Notification"
      if: ${{ inputs.isPreRelease == 'false' }}
      shell: bash
      run: |
        body=$(cat << EOF
        {
          "cards": [
            {
              "header": {
                  "title": "New Release PR"
              },
              "sections": [
                {
                  "widgets": [
                    {
                      "keyValue": {
                        "topLabel": "Pull Request",
                        "content": "${{ steps.pr.outputs.prURL }}",
                        "button": {
                          "textButton": {
                            "text": "Merge",
                            "onClick": {
                              "openLink": {
                                "url": "${{ steps.pr.outputs.prURL }}"
                              }
                            }
                          }
                        }
                      }
                    }
                  ]
                }
              ]
            }
          ]
        }
        EOF
        )
        curl \
          -X POST \
          -H 'Content-Type: application/json' \
          "${{ inputs.chatAPI }}" \
          -d "$body"
